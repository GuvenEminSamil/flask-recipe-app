{% extends "base.html" %}
{% block content %}
  <h2>Search Meals</h2>
  <form method="get">
    <input type="text" name="q" class="form-control" placeholder="Search for a meal..." value="{{ query }}">
    <button type="submit" class="btn btn-primary mt-2">Search</button>
  </form>

  {% if meals %}
    <div class="row mt-4">
      {% for meal in meals %}
        <div class="col-md-4 mb-3">
          <div class="card">
            <img src="{{ meal.strMealThumb }}" class="card-img-top">
            <div class="card-body">
              <h5 class="card-title">{{ meal.strMeal }}</h5>
              <p class="card-text"><strong>Category:</strong> {{ meal.strCategory }}</p>
              <a href="{{ url_for('meal_detail', meal_id=meal.idMeal) }}" class="btn btn-sm btn-outline-secondary">Details</a>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  {% elif query %}
    <p class="mt-4">No meals found for "{{ query }}"</p>
  {% endif %}
{% endblock %}
