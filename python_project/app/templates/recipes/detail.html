{% extends "base.html" %}
{% block content %}
  <h2>{{ recipe.name }}</h2>
  <img src="{{ recipe.thumbnail }}" class="img-fluid mb-3">
  <p><strong>Category:</strong> {{ recipe.category }}</p>
  <p><strong>Area:</strong> {{ recipe.area }}</p>
  <h5>Instructions:</h5>
  <p>{{ recipe.instructions }}</p>
  <form action="{{ url_for('toggle_favorite', recipe_id=recipe.id) }}" method="post" style="display:inline;">
    <button type="submit" class="btn btn-sm btn-outline-danger">
      {% if recipe in user.favorites %}
        ❤️ Unfavorite
      {% else %}
        🤍 Favorite
      {% endif %}
    </button>
  </form>
  <br>
  <a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">Back to All Recipes</a>

{% endblock %}
