{% extends "base.html" %}
{% block content %}
<h2 class="text-center">Live Chat</h2>

<div id="messages" class="border rounded p-3 mb-3 {{ 'bg-dark text-light' if dark_mode else 'bg-light' }}" style="height: 400px; overflow-y: scroll;">
    {% for message in messages %}
        <div><strong>{{ message.username }}</strong>: {{ message.content }}</div>
    {% endfor %}
</div>

<div class="input-group">
    <input type="text" id="messageInput" class="form-control" placeholder="Type a message" autofocus>
    <button onclick="sendMessage()" class="btn btn-primary">Send</button>
</div>

<script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
<script>
    const socket = io();

    socket.on("message", function(msg) {
        const messages = document.getElementById("messages");
        const entry = document.createElement("div");
        entry.innerHTML = msg;
        messages.appendChild(entry);
        messages.scrollTop = messages.scrollHeight;
    });

    function sendMessage() {
        const input = document.getElementById("messageInput");
        const message = input.value.trim();
        if (message !== "") {
            socket.send(message);
            input.value = "";
        }
    }

    document.getElementById("messageInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });
</script>
{% endblock %}
